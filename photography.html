<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photography</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Inter';background:#FFEBED;color:#27153D}
h1{font-family:'Playfair Display';padding:30px}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:40px}
.gallery img{width:100%;height:300px;object-fit:cover;border-radius:12px}
</style>
</head>
<body>
<h1>Photography</h1>
<div class="gallery">
<img src="photo1.jpg"><img src="photo2.jpg"><img src="photo3.jpg">
</div>
</body>
</html>
