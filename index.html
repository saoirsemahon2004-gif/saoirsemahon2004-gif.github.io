<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saoirse Mahon Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {margin:0;font-family:'Inter',sans-serif;background:#FFEBED;color:#27153D}
    header{display:flex;justify-content:space-between;padding:30px 50px}
    h1{font-family:'Playfair Display',serif}
    nav a{margin-left:30px;text-decoration:none;color:#27153D;transition:0.2s;display:inline-block}
    nav a:hover{transform:scale(1.08);opacity:0.7}
    nav a:active{transform:scale(1.2)}
    section{padding:100px 50px;opacity:0;transform:translateY(30px);transition:0.8s}
    section.visible{opacity:1;transform:translateY(0)}
    .works-grid{display:flex;gap:60px;justify-content:center}
    .work-item img{width:220px;height:220px;object-fit:cover;border-radius:16px}
    footer{padding:50px;text-align:center;background:#F6B6B7}
  </style>
</head>
<body>

<header>
  <div>
    <h1>Saoirse Mahon</h1>
    <p>Media Practitioner</p>
  </div>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#works">Works</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="about"><h2>About Me</h2></section>

<section id="works">
  <h2>Works</h2>
  <div class="works-grid">
    <div class="work-item"><img src="photo1.jpg"><a href="photography.html">Photography</a></div>
    <div class="work-item"><img src="photo2.jpg"><a href="video.html">Video</a></div>
    <div class="work-item"><img src="photo3.jpg"><a href="other.html">Other Works</a></div>
  </div>
</section>

<section id="contact"><h2>Contact</h2></section>

<footer><h3>Social Media</h3></footer>

<script>
const sections=document.querySelectorAll('section');
const observer=new IntersectionObserver(entries=>{
entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible')}})
},{threshold:0.2});
sections.forEach(s=>observer.observe(s));
</script>

</body>
</html>
