<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saoirse Mahon Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {margin:0;font-family:'Inter',sans-serif;background:#FFEBED;color:#27153D}
    header{display:flex;justify-content:space-between;align-items:flex-start;padding:30px 50px}
    h1{font-family:'Playfair Display',serif;margin:0}
    header p{margin:4px 0 0;color:#3E2E4A}

    nav a{margin-left:30px;text-decoration:none;color:#27153D;transition:0.2s;display:inline-block}
    nav a:hover{transform:scale(1.08);opacity:0.7}
    nav a:active{transform:scale(1.2)}

    section{padding:100px 50px;opacity:0;transform:translateY(30px);transition:0.8s}
    section.visible{opacity:1;transform:translateY(0)}

    h2{font-family:'Playfair Display',serif;font-weight:400;margin-bottom:20px}

    .works-grid{display:flex;gap:60px;justify-content:center;flex-wrap:wrap}
    .work-item{text-align:center}
    .work-item img{width:220px;height:220px;object-fit:cover;border-radius:16px;display:block;margin-bottom:10px;transition:0.4s}
    .work-item img:hover{transform:scale(1.05)}

    footer{padding:50px;text-align:center;background:#F6B6B7}

    /* --- UPGRADED SOCIAL SECTION --- */
    .social-section{padding:80px 20px 120px}

    .social-header{
      text-align:center;
      margin-bottom:40px;
    }

    .social-header h2{margin-bottom:10px}

    .social-header a{
      text-decoration:none;
      color:#27153D;
      font-size:14px;
      opacity:0.7;
    }

    /* horizontal scroll gallery */
    .social-feed{
      display:flex;
      gap:20px;
      overflow-x:auto;
      padding:10px 40px;
      scroll-snap-type:x mandatory;
    }

    .social-feed::-webkit-scrollbar{display:none}

    .social-item{
      min-width:220px;
      height:280px;
      border-radius:16px;
      overflow:hidden;
      scroll-snap-align:start;
      position:relative;
    }

    .social-item img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:0.4s;
    }

    .social-item:hover img{
      transform:scale(1.06);
    }

    .social-item a{
      position:absolute;
      inset:0;
    }

  </style>
</head>
<body>

<header>
  <div>
    <h1>Saoirse Mahon</h1>
    <p>Media Practitioner</p>
  </div>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#works">Works</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="about">
  <h2>About Me</h2>
  <p>Write about yourself here.</p>
</section>

<section id="works">
  <h2>Works</h2>
  <div class="works-grid">
    <div class="work-item">
      <img src="photo1.jpg">
      <a href="photography.html">Photography</a>
    </div>
    <div class="work-item">
      <img src="photo2.jpg">
      <a href="video.html">Video</a>
    </div>
    <div class="work-item">
      <img src="photo3.jpg">
      <a href="other.html">Other Works</a>
    </div>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Your contact info here.</p>
</section>

<footer>
  <h3>Social Media</h3>
</footer>

<section class="social-section">

  <div class="social-header">
    <h2>Instagram</h2>
    <a href="https://www.instagram.com/saoirseonfilm/" target="_blank">@saoirseonfilm</a>
  </div>

  <div class="social-feed">
    <!-- replace these with your actual images + post links -->
    <div class="social-item">
      <img src="insta1.jpg">
      <a href="https://www.instagram.com/saoirseonfilm/" target="_blank"></a>
    </div>
    <div class="social-item">
      <img src="insta2.jpg">
      <a href="https://www.instagram.com/saoirseonfilm/" target="_blank"></a>
    </div>
    <div class="social-item">
      <img src="insta3.jpg">
      <a href="https://www.instagram.com/saoirseonfilm/" target="_blank"></a>
    </div>
    <div class="social-item">
      <img src="insta4.jpg">
      <a href="https://www.instagram.com/saoirseonfilm/" target="_blank"></a>
    </div>
  </div>

</section>

<script>
const sections=document.querySelectorAll('section');
const observer=new IntersectionObserver(entries=>{
entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible')}})
},{threshold:0.2});
sections.forEach(s=>observer.observe(s));
</script>

</body>
</html>
